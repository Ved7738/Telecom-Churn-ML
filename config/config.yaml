# =============================================================================
# config.yaml  —  Central Control Panel for the Entire Project
#
# WHY THIS FILE EXISTS:
#   Instead of hunting through 5 different Python files to change a setting
#   (like "use 80% data for training instead of 75%"), you just change it HERE.
#   All Python files read their settings from this one place.
#
# HOW IT WORKS:
#   Python reads this file using the PyYAML library and converts it to a
#   dictionary. Think of it like a JSON file but more readable.
# =============================================================================

# ── DATA SETTINGS ─────────────────────────────────────────────────────────────
data:
  # Where is the raw CSV file?
  raw_path: "data/raw/telecom_churn.csv"

  # Where should cleaned/processed data be saved?
  processed_path: "data/processed/"

  # Which column in the CSV is the answer we want to predict?
  # "Churn" means: did the customer leave? (Yes=1, No=0)
  target_column: "Churn"

  # customerID is just a unique identifier (like a roll number).
  # It carries NO information about churn, so we drop it.
  drop_columns:
    - "customerID"


# ── PREPROCESSING SETTINGS ───────────────────────────────────────────────────
preprocessing:
  # These columns contain NUMBERS (e.g., 24 months, $65.50)
  # We will SCALE them (bring all to same range) so no column dominates others.
  # Example: tenure is 0-72, MonthlyCharges is 18-118 — scaling makes them comparable.
  numeric_columns:
    - "tenure"
    - "MonthlyCharges"
    - "TotalCharges"

  # These columns contain WORDS/CATEGORIES (e.g., "Male", "Yes", "DSL")
  # We will ENCODE them to numbers (e.g., Male=0, Female=1) so the model can read them.
  categorical_columns:
    - "gender"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "Contract"
    - "PaperlessBilling"
    - "PaymentMethod"

  # SeniorCitizen is already 0 or 1 in the CSV — no encoding needed.
  binary_columns:
    - "SeniorCitizen"

  # Use 80% of data for training, 20% for testing.
  # Testing data = data the model has NEVER seen. Used to measure real accuracy.
  test_size: 0.2

  # A "seed" for random operations — ensures same results every time you run.
  # Like rolling the same dice outcome by fixing the randomness.
  random_state: 42

  # stratify=true means: keep the same 26%/74% churn ratio in both
  # train and test sets. Prevents accidentally putting all churners in one set.
  stratify: true


# ── FEATURE ENGINEERING SETTINGS ─────────────────────────────────────────────
feature_engineering:
  # After creating new features, keep only the top 15 most useful ones.
  # Too many features = "noise" that confuses the model (curse of dimensionality).
  n_top_features: 15

  # Should we create INTERACTION features?
  # Example: tenure × MonthlyCharges = a combined "total commitment" score.
  create_interactions: true

  # Should we create RATIO features?
  # Example: TotalCharges ÷ tenure = average monthly spend (tells us spending trend).
  create_ratio_features: true


# ── MODEL TRAINING SETTINGS ───────────────────────────────────────────────────
model_training:
  random_state: 42

  # Cross-validation: train on 4 parts, test on 1 part, repeat 5 times.
  # Gives a more reliable accuracy estimate than a single train/test split.
  cv_folds: 5

  # The metric we use to compare models. F1-score balances Precision and Recall.
  # Better than accuracy for imbalanced data (we have more "No" than "Yes").
  scoring: "f1"

  models:
    logistic_regression:
      max_iter: 1000     # Maximum attempts to find the best formula
      random_state: 42

    random_forest:
      n_estimators: 100  # Number of trees in the "forest" (more = more accurate but slower)
      max_depth: 10      # How deep each tree can grow (prevents memorising = overfitting)
      random_state: 42
      n_jobs: -1         # Use ALL CPU cores for speed

    xgboost:
      n_estimators: 100  # Number of boosting rounds
      max_depth: 5       # Tree depth
      learning_rate: 0.1 # How fast it learns (smaller = more careful but slower)
      random_state: 42
      n_jobs: -1


# ── HYPERPARAMETER TUNING ────────────────────────────────────────────────────
# "Hyperparameters" are settings of the model itself (like dials on a radio).
# Grid search tries ALL combinations and picks the best.
hyperparameter_tuning:
  rf_param_grid:
    n_estimators: [50, 100, 200]
    max_depth: [5, 10, 15]
    min_samples_split: [5, 10, 20]
    min_samples_leaf: [2, 4, 8]

  xgb_param_grid:
    n_estimators: [50, 100]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1, 0.2]
    subsample: [0.7, 0.9, 1.0]


# ── FILE PATHS ───────────────────────────────────────────────────────────────
paths:
  models_dir: "models/"
  logs_dir: "logs/"
  # The trained model saved as a binary file (.pkl = pickle format)
  model_file: "models/best_model.pkl"
  # The FULL pipeline (preprocessor + feature engineer + model) in one file
  pipeline_file: "models/pipeline.pkl"


# ── FLASK WEB APP ─────────────────────────────────────────────────────────────
flask:
  host: "0.0.0.0"   # Listen on all network interfaces (accessible from other PCs too)
  port: 5000
  debug: true        # Auto-reload when code changes (turn OFF in production)
